<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Search Products - FreshMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:," />
</head>

<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
            <a href="index.html" class="text-2xl font-bold text-green-600">FreshMart</a>

            <div class="space-x-4 flex items-center">
                <p id="welcomeName" class="text-gray-700 font-medium"></p>
                <a href="login.html" class="text-gray-600 hover:text-green-600">Login</a>
                <a href="register.html" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">
                    Register
                </a>
                <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 space-y-8">

        <section class="bg-white rounded-xl shadow p-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Find Healthy Products</h1>
            <p class="text-gray-600 mb-6">Search by product name, category, or diet tag.</p>

            <form id="searchForm" class="grid md:grid-cols-4 gap-4">
                <input id="name" type="text" placeholder="Search by product name" class="border p-3 rounded-lg" />

                <input id="category" type="text" placeholder="Category" class="border p-3 rounded-lg" />

                <input id="dietTag" type="text" placeholder="Diet tag" class="border p-3 rounded-lg" />

                <button type="submit" class="bg-green-500 text-white py-3 rounded-lg hover:bg-green-600">
                    Search
                </button>

                <button type="button" id="resetBtn"
                    class="md:col-span-4 border border-gray-300 text-gray-700 py-3 rounded-lg hover:bg-gray-100">
                    Reset Filters
                </button>
            </form>
        </section>

        <section class="bg-white rounded-xl shadow p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-semibold text-gray-800">Results</h2>
                <p id="resultCount" class="text-sm text-gray-500"></p>
            </div>

            <div id="results" class="grid md:grid-cols-2 gap-4"></div>
        </section>

    </main>

    <script src="js/search.js"></script>
</body>

</html>
